name: Daily KI News Update

on:
  schedule:
    - cron: '0 7 * * *'   # 08:00 Uhr Berlin (MEZ = UTC+1)
  workflow_dispatch:        # Manueller Start jederzeit möglich

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: KI-News abrufen
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: bun scripts/fetch-news.mjs

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json
          git diff --staged --quiet && echo "Keine Änderungen." && exit 0
          git commit -m "news: KI-Update $(date +%Y-%m-%d)"
          git push
